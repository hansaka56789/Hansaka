<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Cinemax Music</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg1:#0f0f0f;--bg2:#1a1a1a;--bg3:#272727;--t1:#fff;--t2:#aaa;--t3:#717171;
  --red:#ff0000;--border:#333;--whatsapp:#25D366;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg1);color:var(--t1);overscroll-behavior:none;
  user-select:none;-webkit-user-select:none;padding-bottom:60px;
}
button{border:none;background:none;color:inherit;font:inherit;cursor:pointer}

.app-header{
  position:sticky;top:0;z-index:100;background:var(--bg1);
  padding:8px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.logo{
  display:flex;align-items:center;gap:4px;font-size:18px;font-weight:900;
}
.logo-icon{
  width:28px;height:20px;background:var(--red);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;
}
.search-wrap{flex:1;display:flex;gap:8px}
.search-input{
  flex:1;background:var(--bg2);border:1px solid var(--border);
  border-radius:20px;padding:8px 16px;color:var(--t1);font-size:14px;
  outline:none;
}
.search-input:focus{border-color:#1c62b9}
.search-btn,.settings-btn{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.search-btn:active,.settings-btn:active{background:var(--bg3)}

.trend-scroll{
  padding:12px 16px;overflow-x:auto;scrollbar-width:none;
  display:flex;gap:8px;background:var(--bg1);
}
.trend-scroll::-webkit-scrollbar{display:none}
.trend-chip{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:6px 12px;white-space:nowrap;
  font-size:14px;font-weight:500;transition:all.15s;
  display:flex;align-items:center;gap:6px;
}
.trend-chip.active{background:var(--t1);color:var(--bg1);border-color:var(--t1)}
.trend-chip:active{transform:scale(.95)}
.trend-chip-icon{font-size:16px}

/* Hero - Dynamic Background */
.hero{
  height:220px;background:linear-gradient(135deg,#1a1a1a,#0f);
  background-size:cover;background-position:center;
  display:flex;align-items:flex-end;padding:16px;position:relative;
  margin:0 0 12px;transition:background-image.5s ease;
}
.hero::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.95),rgba(0,0,0,.4),transparent);
}
.hero-content{position:relative;z-index:1;width:100%}
.hero-badge{
  background:var(--red);color:#fff;font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:8px;
}
.hero-title{font-size:22px;font-weight:700;margin-bottom:4px;line-height:1.2}
.hero-sub{font-size:13px;color:var(--t2);margin-bottom:12px}
.hero-btn{
  background:var(--t1);color:var(--bg1);border-radius:20px;
  padding:8px 16px;font-size:14px;font-weight:700;
  display:inline-flex;align-items:center;gap:6px;
}
.hero-btn:active{transform:scale(.95)}

/* Shorts Section - Hero එකට යටින් */
.shorts-section{
  padding:12px 0;border-bottom:1px solid var(--border);
}
.shorts-header{
  padding:0 16px 12px;display:flex;align-items:center;justify-content:space-between;
}
.shorts-title{
  font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;
}
.shorts-icon{color:var(--red);font-size:20px}
.shorts-scroll{
  display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;
  padding:0 16px;
}
.shorts-scroll::-webkit-scrollbar{display:none}
.shorts-item{
  flex-shrink:0;width:140px;cursor:pointer;
}
.shorts-thumb{
  width:100%;aspect-ratio:9/16;border-radius:12px;overflow:hidden;
  position:relative;background:var(--bg3);
}
.shorts-thumb img{width:100%;height:100%;object-fit:cover}
.shorts-badge{
  position:absolute;top:8px;left:8px;background:var(--red);
  color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;
}
.shorts-info{padding:8px 4px 0}
.shorts-title{
  font-size:13px;font-weight:500;line-height:1.3;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.shorts-views{font-size:11px;color:var(--t2);margin-top:2px}

.fifa-live-card{
  margin:12px 16px;background:var(--bg2);border-radius:12px;
  overflow:hidden;border:2px solid var(--red);
}
.fifa-live-thumb{width:100%;aspect-ratio:16/9;object-fit:cover}
.fifa-live-info{padding:12px}
.fifa-live-title{font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.3}
.fifa-live-channel{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:4px;margin-bottom:8px}
.fifa-live-stats{font-size:11px;color:var(--red);font-weight:700;margin-bottom:10px}
.watch-live-btn{
  background:var(--red);color:#fff;border-radius:8px;
  padding:10px 20px;font-size:14px;font-weight:700;
  width:100%;display:flex;align-items:center;justify-content:center;gap:6px;
}
.watch-live-btn:active{opacity:.8}

.yt-results{
  padding:0 16px 16px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
.yt-video{
  background:var(--bg2);border-radius:12px;overflow:hidden;
  cursor:pointer;transition:all.15s;
  display:flex;flex-direction:column;
}
.yt-video:active{transform:scale(.98)}
.yt-thumb-wrap{
  width:100%;aspect-ratio:16/9;position:relative;
}
.yt-thumb{
  width:100%;height:100%;object-fit:cover;display:block;
}
.yt-duration{
  position:absolute;bottom:6px;right:6px;
  background:rgba(0,0,0,.8);color:#fff;
  font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;
}
.yt-info{padding:10px}
.yt-title{font-size:13px;font-weight:500;margin-bottom:4px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.yt-channel-row{
  display:flex;align-items:center;gap:6px;margin-bottom:2px;
}
.yt-channel-icon{
  width:20px;height:20px;border-radius:50%;background:var(--bg3);
  flex-shrink:0;
}
.yt-channel{font-size:11px;color:var(--t2)}
.yt-meta{font-size:11px;color:var(--t2)}
.yt-menu{
  position:absolute;top:6px;right:6px;
  width:24px;height:24px;border-radius:50%;
  background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;
}

.loading,.error{
  padding:40px 16px;text-align:center;color:var(--t2);
  grid-column:1/-1;
}
.spinner{
  width:32px;height:32px;border:3px solid var(--bg3);
  border-top-color:var(--red);border-radius:50%;
  animation:spin.8s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.error-title{color:var(--red);font-weight:600;margin-bottom:8px;font-size:16px}

.player-modal{
  position:fixed;inset:0;z-index:200;background:var(--bg1);
  display:none;flex-direction:column;
}
.player-modal.open{display:flex}
.player-header{
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);
}
.close-btn{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.close-btn:active{background:var(--bg3)}
.player-title{flex:1;font-size:15px;font-weight:600}
.yt-player{width:100%;aspect-ratio:16/9;border:none;background:#000}

.settings-panel{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);
  display:none;align-items:flex-end;
}
.settings-panel.open{display:flex}
.settings-sheet{
  background:var(--bg2);border-radius:16px 16px 0 0;
  width:100%;max-height:70vh;overflow-y:auto;
  animation:slideUp.25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.settings-header{
  padding:16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.settings-title{font-size:18px;font-weight:700}
.settings-item{
  padding:16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.settings-label{font-size:15px;display:flex;align-items:center;gap:10px}
.settings-label-icon{font-size:20px}
.toggle{
  width:48px;height:28px;background:var(--bg3);border-radius:14px;
  position:relative;transition:background.2s;
}
.toggle.active{background:var(--red)}
.toggle-thumb{
  width:24px;height:24px;background:#fff;border-radius:50%;
  position:absolute;top:2px;left:2px;transition:transform.2s;
}
.toggle.active.toggle-thumb{transform:translateX(20px)}
.quality-btns{display:flex;gap:8px}
.quality-btn{
  background:var(--bg3);border-radius:8px;padding:6px 12px;
  font-size:13px;font-weight:600;
}
.quality-btn.active{background:var(--red);color:#fff}
.contact-btn{
  background:var(--whatsapp);color:#fff;border-radius:8px;
  padding:10px 20px;font-size:14px;font-weight:700;
  display:flex;align-items:center;gap:8px;
}
.contact-btn:active{opacity:.8}

.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg1);border-top:1px solid var(--border);
  display:flex;justify-content:space-around;padding:8px 0;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:4px;font-size:10px;color:var(--t2);
}
.nav-item.active{color:var(--t1)}
.nav-icon{font-size:22px}

@media(max-width:480px){
.yt-results{grid-template-columns:1fr}
.shorts-item{width:120px}
}
@media(min-width:768px){
.yt-results{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:1024px){
.yt-results{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>

<script>
const YT_API_URL = 'https://www.googleapis.com/youtube/v3';

// උඹ දුන්න API Keys 3
const YT_API_KEYS = [
  'AIzaSyBmo2_cfffiJvts4fXtDnDLuqqINY7cTP0',
  'AIzaSyCKujaEiRoGggrStbZMluXl9efLB6e7ow8',
  'AIzaSyAZ8ZkCiThb4haQinA1JIeyiuwlgV4_FDY'
];

let currentKeyIndex = 0;
let failedKeys = JSON.parse(localStorage.getItem('failedKeys') || '[]');
let keyUsageCount = JSON.parse(localStorage.getItem('keyUsage') || '{}');
let lastResetDate = localStorage.getItem('lastReset') || '';

// කලින් upload කරපු background photos
const CATEGORY_BGS = {
  trending: 'image_trending.jpg',
  'kids songs': 'image_kids.gpj',
  'hollywood songs': 'image_hollywood.jpg',
  'bollywood songs': 'image_boolywood.jpg',
  kpop: 'image_kpop.jpg',
  'fifa world cup live': 'image_fifawc.jpg',
  'live': 'image_live.jpg',
  'all': 'image_trending.jpg',
  'music': 'image_trending.jpg',
  'mixes': 'image_trending.jpg',
  'gaming': 'image_trending.jpg'
};

let currentCategory = 'all';
let settings = { bgPlay: false, quality: 'medium' };
const searchCache = {};
const CACHE_TIME = 3600000;
let heroVideoId = '';
let currentSongIndex = 0;

function checkDailyReset(){
  const now = new Date();
  const today = now.toDateString();
  const hour = now.getHours();
  const minute = now.getMinutes();
  if(lastResetDate!== today && hour >= 12 && minute >= 30){
    console.log('🔄 Daily reset - All keys restored');
    failedKeys = [];
    keyUsageCount = {};
    lastResetDate = today;
    localStorage.setItem('lastReset', today);
    localStorage.setItem('failedKeys', JSON.stringify(failedKeys));
    localStorage.setItem('keyUsage', JSON.stringify(keyUsageCount));
  }
}

function getApiKey(){
  checkDailyReset();
  if(failedKeys.length >= YT_API_KEYS.length){
    console.log('⚠️ All keys exhausted');
    return null;
  }
  let availableKeys = [];
  for(let i = 0; i < YT_API_KEYS.length; i++){
    if(!failedKeys.includes(i)) availableKeys.push(i);
  }
  let minUsage = Infinity;
  availableKeys.forEach(idx => {
    const usage = keyUsageCount[idx] || 0;
    if(usage < minUsage){
      minUsage = usage;
      currentKeyIndex = idx;
    }
  });
  keyUsageCount[currentKeyIndex] = (keyUsageCount[currentKeyIndex] || 0) + 1;
  localStorage.setItem('keyUsage', JSON.stringify(keyUsageCount));
  console.log(`🔑 Key ${currentKeyIndex + 1}/${YT_API_KEYS.length} | Used: ${keyUsageCount[currentKeyIndex]}x | Active: ${YT_API_KEYS.length-failedKeys.length}/${YT_API_KEYS.length}`);
  return YT_API_KEYS[currentKeyIndex];
}

function markKeyAsFailed(){
  if(!failedKeys.includes(currentKeyIndex)){
    failedKeys.push(currentKeyIndex);
    localStorage.setItem('failedKeys', JSON.stringify(failedKeys));
    console.log(`❌ Key ${currentKeyIndex + 1} failed | Dead: ${failedKeys.length}/${YT_API_KEYS.length}`);
  }
}

function selectCategory(query, el){
  document.querySelectorAll('.trend-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentCategory = query;
  
  if(query === 'all'){
    document.getElementById('ytSearchInput').value = 'trending music';
  } else {
    document.getElementById('ytSearchInput').value = query;
  }
  searchYouTube();
  loadShorts();
}

async function loadShorts(){
  const shortsScroll = document.getElementById('shortsScroll');
  const YT_API_KEY = getApiKey();
  if(!YT_API_KEY) return;
  
  try {
    const res = await fetch(`${YT_API_URL}/search?part=snippet&q=${encodeURIComponent(currentCategory + ' shorts')}&type=video&videoDuration=short&maxResults=10&key=${YT_API_KEY}`);
    const data = await res.json();
    if(!data.items?.length) return;
    
    shortsScroll.innerHTML = data.items.map(item => `
      <div class="shorts-item" onclick="playVideo('${item.id.videoId}')">
        <div class="shorts-thumb">
          <img src="${item.snippet.thumbnails.high.url}" alt="${item.snippet.title}">
          <div class="shorts-badge">SHORT</div>
        </div>
        <div class="shorts-info">
          <div class="shorts-title">${item.snippet.title}</div>
          <div class="shorts-views">${item.snippet.channelTitle}</div>
        </div>
      </div>
    `).join('');
  } catch(err) {
    console.log('Shorts load error:', err);
    if(err.message.includes('quota')) markKeyAsFailed();
  }
}

async function searchYouTube(retryCount = 0){
  const query = document.getElementById('ytSearchInput').value.trim();
  if(!query) return;
  
  const cacheKey = currentCategory + '_' + query;
  if(searchCache[cacheKey] && Date.now() - searchCache[cacheKey].time < CACHE_TIME){
    displayResults(searchCache[cacheKey].data);
    return;
  }
  
  const results = document.getElementById('ytResults');
  const liveContainer = document.getElementById('fifaLiveContainer');
  const searchBtn = document.getElementById('searchBtn');
  searchBtn.disabled = true;
  results.innerHTML = '<div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Searching...</div>';
  liveContainer.innerHTML = '';
  
  const YT_API_KEY = getApiKey();
  if(!YT_API_KEY){
    results.innerHTML = `<div class="error" style="grid-column:1/-1">
      <div class="error-title">⚠️ All 3 Keys Exhausted</div>
      හෙට දවල් 12:30ට reset වෙනවා
    </div>`;
    searchBtn.disabled = false;
    return;
  }
  
  let apiUrl = `${YT_API_URL}/search?part=snippet&q=${encodeURIComponent(query + ' song')}&type=video&videoCategoryId=10&maxResults=20&key=${YT_API_KEY}`;
  
  if(currentCategory === 'fifa world cup live'){
    apiUrl = `${YT_API_URL}/search?part=snippet&q=${encodeURIComponent('FIFA World Cup live match')}&type=video&eventType=live&maxResults=20&order=viewCount&key=${YT_API_KEY}`;
  }
  else if(currentCategory === 'live'){
    apiUrl = `${YT_API_URL}/search?part=snippet&q=${encodeURIComponent(query)}&type=video&eventType=live&maxResults=20&key=${YT_API_KEY}`;
  }
  else if(currentCategory === 'all'){
    apiUrl = `${YT_API_URL}/search?part=snippet&q=${encodeURIComponent('trending music')}&type=video&videoCategoryId=10&maxResults=20&order=viewCount&key=${YT_API_KEY}`;
  }
  
  try {
    const searchRes = await fetch(apiUrl);
    const searchData = await searchRes.json();
    
    if(searchData.error){
      if(searchData.error.message.includes('quota') || searchData.error.message.includes('exceeded')){
        throw new Error('quotaExceeded');
      }
      throw new Error(searchData.error.message);
    }
    
    if(!searchData.items?.length){
      results.innerHTML = `<div class="error" style="grid-column:1/-1">
        <div class="error-title">No Results</div>
        No videos found
      </div>`;
      searchBtn.disabled = false;
      return;
    }
    
    const videoIds = searchData.items.map(item => item.id.videoId).join(',');
    const detailsRes = await fetch(`${YT_API_URL}/videos?part=contentDetails,statistics,liveStreamingDetails&id=${videoIds}&key=${YT_API_KEY}`);
    const detailsData = await detailsRes.json();
    
    searchCache[cacheKey] = {
      data: {searchData, detailsData},
      time: Date.now()
    };
    
    // Song එකට background change වෙනවා
    if(searchData.items[0]){
      heroVideoId = searchData.items[0].id.videoId;
      currentSongIndex = 0;
      
      // Category background or video thumbnail
      const bg = CATEGORY_BGS[currentCategory] || searchData.items[0].snippet.thumbnails.high.url;
      document.getElementById('heroBanner').style.backgroundImage = `url(${bg})`;
      document.getElementById('heroTitle').textContent = searchData.items[0].snippet.title;
      document.getElementById('heroSub').textContent = searchData.items[0].snippet.channelTitle;
    }
    
    displayResults({searchData, detailsData});
    
  } catch(err) {
    if(err.message === 'quotaExceeded'){
      markKeyAsFailed();
      if(failedKeys.length >= YT_API_KEYS.length){
        results.innerHTML = `<div class="error" style="grid-column:1/-1">
          <div class="error-title">⚠️ All 3 Keys Exhausted</div>
          හෙට 12:30 PMට reset වෙනවා
        </div>`;
        searchBtn.disabled = false;
        return;
      }
      if(retryCount < 3){
        results.innerHTML = `<div class="loading" style="grid-column:1/-1">
          <div class="spinner"></div>
          Key ${currentKeyIndex + 1} failed<br>
          Trying next key... (${YT_API_KEYS.length-failedKeys.length} left)
        </div>`;
        setTimeout(() => searchYouTube(retryCount + 1), 1000);
            } else {
        results.innerHTML = `<div class="error" style="grid-column:1/-1"><div class="error-title">Error</div>Too many retries</div>`;
        searchBtn.disabled = false;
      }
    } else {
      results.innerHTML = `<div class="error" style="grid-column:1/-1"><div class="error-title">Error</div>${err.message}</div>`;
      searchBtn.disabled = false;
    }
  }
}

function displayResults({searchData, detailsData}){
  const results = document.getElementById('ytResults');
  const liveContainer = document.getElementById('fifaLiveContainer');
  
  const videos = searchData.items.map(item => {
    const details = detailsData.items.find(v => v.id === item.id.videoId);
    const isLive = details?.snippet?.liveBroadcastContent === 'live';
    const viewers = details?.liveStreamingDetails?.concurrentViewers;
    return {
      id: item.id.videoId,
      title: item.snippet.title,
      channel: item.snippet.channelTitle,
      thumbnail: item.snippet.thumbnails.high.url,
      duration: isLive? '🔴 LIVE' : (details? formatDuration(details.contentDetails.duration) : ''),
      views: viewers? formatViews(viewers) + ' watching' : (details? formatViews(details.statistics.viewCount) + ' views' : ''),
      isLive: isLive
    };
  });
  
  if(currentCategory === 'fifa world cup live'){
    const liveMatch = videos.find(v => v.isLive);
    if(liveMatch){
      liveContainer.innerHTML = `
        <div class="fifa-live-card">
          <img src="${liveMatch.thumbnail}" class="fifa-live-thumb" alt="${liveMatch.title}">
          <div class="fifa-live-info">
            <div class="fifa-live-title">${liveMatch.title}</div>
            <div class="fifa-live-channel">
              <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
              ${liveMatch.channel}
            </div>
            <div class="fifa-live-stats">${liveMatch.views}</div>
            <button class="watch-live-btn" onclick="playVideo('${liveMatch.id}', '${liveMatch.thumbnail}')">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              Watch Live
            </button>
          </div>
        </div>
      `;
    }
  }
  
  results.innerHTML = videos.map((video, index)=>`
    <div class="yt-video" onclick="playVideo('${video.id}', '${video.thumbnail}', ${index})">
      <div class="yt-thumb-wrap">
        <img src="${video.thumbnail}" class="yt-thumb" alt="${video.title}">
        <div class="yt-duration" style="${video.isLive? 'background:#FF0000;font-weight:700' : ''}">${video.duration}</div>
        <div class="yt-menu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </div>
      </div>
      <div class="yt-info">
        <div class="yt-title">${video.title}</div>
        <div class="yt-channel-row">
          <div class="yt-channel-icon"></div>
          <div class="yt-channel">${video.channel}</div>
        </div>
        <div class="yt-meta">${video.views}</div>
      </div>
    </div>
  `).join('');
  
  document.getElementById('searchBtn').disabled = false;
}

function playHeroVideo(){
  if(heroVideoId) playVideo(heroVideoId);
}

// Song එකක් click කරාම Hero background එක change වෙනවා
function playVideo(videoId, thumbnail, index){
  const quality = settings.quality === 'high'? 'hd720' : settings.quality === 'low'? 'small' : 'medium';
  const modal = document.getElementById('ytPlayerModal');
  const player = document.getElementById('ytPlayer');
  
  // Hero background update - song එකේ thumbnail එකට
  if(thumbnail){
    document.getElementById('heroBanner').style.backgroundImage = `url(${thumbnail})`;
  }
  if(typeof index !== 'undefined'){
    currentSongIndex = index;
  }
  
  player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&vq=${quality}&playsinline=1`;
  modal.classList.add('open');
}

function closePlayer(e){
  if(!e || e.target === document.getElementById('ytPlayerModal')){
    document.getElementById('ytPlayer').src = '';
    document.getElementById('ytPlayerModal').classList.remove('open');
  }
}

function openSettings(){
  document.getElementById('settingsPanel').classList.add('open');
  document.getElementById('bgPlayToggle').classList.toggle('active', settings.bgPlay);
  document.querySelectorAll('.quality-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.quality === settings.quality);
  });
}

function closeSettings(e){
  if(!e || e.target === document.getElementById('settingsPanel')){
    document.getElementById('settingsPanel').classList.remove('open');
  }
}

function toggleBgPlay(){
  settings.bgPlay =!settings.bgPlay;
  document.getElementById('bgPlayToggle').classList.toggle('active', settings.bgPlay);
  localStorage.setItem('bgPlay', settings.bgPlay);
}

function setQuality(quality, el){
  settings.quality = quality;
  document.querySelectorAll('.quality-btn').forEach(btn=>btn.classList.remove('active'));
  el.classList.add('active');
  localStorage.setItem('quality', quality);
}

function formatDuration(iso){
  const match = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  const h = parseInt(match[1]||0);
  const m = parseInt(match[2]||0);
  const s = parseInt(match[3]||0);
  if(h) return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function formatViews(count){
  const n = parseInt(count);
  if(n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if(n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

window.onload = () => {
  settings.bgPlay = localStorage.getItem('bgPlay') === 'true';
  settings.quality = localStorage.getItem('quality') || 'medium';
  document.getElementById('ytSearchInput').value = 'trending music';
  searchYouTube();
  loadShorts();
};
</script>
